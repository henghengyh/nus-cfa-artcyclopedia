name: Daily Web Scraper Search Index

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

# Permissions required to let the bot save files back to your code branch
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install local package dependencies
        run: npm install

      - name: Run Scraper Script
        run: node search-bar/scraper.js

      - name: Commit and Push Updated Index
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add search-index.json
          git commit -m "Automated update of search index database" || echo "No changes to commit"
          git push