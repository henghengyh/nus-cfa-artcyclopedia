<!-- 2. RENDER ENGINE & MODAL CONTROLLER -->
<script>
    function renderVenues() {
        const clusters = {};

        venuesData.forEach(venue => {
            const clusterName = venue.cluster || "Other Venues";
            const subcatName = venue.subcategory || "";

            if (!clusters[clusterName]) {
                clusters[clusterName] = {};
            }
            if (!clusters[clusterName][subcatName]) {
                clusters[clusterName][subcatName] = [];
            }

            clusters[clusterName][subcatName].push(venue);
        });

        const container = document.getElementById('venue-list-container');
        if (!container) return;
        
        container.innerHTML = "";
        let isFirst = true;

        for (const [clusterName, subcategories] of Object.entries(clusters)) {
            const details = document.createElement('details');
            if (isFirst) {
                details.setAttribute('open', '');
                isFirst = false;
            }

            const summary = document.createElement('summary');
            summary.innerHTML = `<span>${clusterName}</span><span class="icon"></span>`;
            
            summary.addEventListener('click', (e) => {
                e.preventDefault();
                if (details.hasAttribute('open')) {
                    if (details.classList.contains('closing')) return;
                    details.classList.add('closing');
                    setTimeout(() => {
                        details.removeAttribute('open');
                        details.classList.remove('closing');
                    }, 380);
                } else {
                    details.setAttribute('open', '');
                }
            });

            details.appendChild(summary);

            const accordionWrapper = document.createElement('div');
            accordionWrapper.className = 'accordion-wrapper';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'content';

            for (const [subcatName, venueList] of Object.entries(subcategories)) {
                if (subcatName) {
                    const secTitle = document.createElement('div');
                    secTitle.className = 'section-title';
                    secTitle.textContent = subcatName;
                    contentDiv.appendChild(secTitle);
                }

                const tagsDiv = document.createElement('div');
                tagsDiv.className = 'tags';

                venueList.forEach(venueObj => {
                    const span = document.createElement('span');
                    span.className = 'tag interactive';
                    span.textContent = venueObj.name;
                    
                    span.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openVenueModal(venueObj, clusterName);
                    });

                    tagsDiv.appendChild(span);
                });

                contentDiv.appendChild(tagsDiv);
            }

            accordionWrapper.appendChild(contentDiv);
            details.appendChild(accordionWrapper);
            container.appendChild(details);
        }
    }

    // Modal Manager
    function openVenueModal(venueObj, clusterName) {
        const setSafeText = (id, text) => {
            const el = document.getElementById(id);
            if (el) el.textContent = text;
        };

        setSafeText('modal-title', venueObj.name || '');

        // Parse composite remarks string (e.g., "Hours: 8am | Platform: Email | Notes...")
        let hours = "", platform = "", cancel = "", notes = venueObj.remarks || "";

        if (notes.includes(" | ")) {
            const parts = notes.split(" | ");
            notes = ""; // Reset to rebuild with leftover notes
            parts.forEach(part => {
                const trimmed = part.trim();
                if (trimmed.startsWith("Hours:")) hours = trimmed.replace("Hours:", "").trim();
                else if (trimmed.startsWith("Platform:")) platform = trimmed.replace("Platform:", "").trim();
                else if (trimmed.startsWith("Cancel:")) cancel = trimmed.replace("Cancel:", "").trim();
                else notes += (notes ? "\n\n" : "") + trimmed;
            });
        }

        // Helper to show/hide fields dynamically if data is missing
        const toggleField = (id, wrapperId, value) => {
            const el = document.getElementById(id);
            const wrapper = document.getElementById(wrapperId);
            if (value && value.toLowerCase() !== "not stated") {
                if (el) el.textContent = value;
                if (wrapper) wrapper.style.display = ''; // Show
            } else {
                if (wrapper) wrapper.style.display = 'none'; // Hide
            }
        };

        // Populate and toggle grid items
        toggleField('modal-cluster', 'wrap-cluster', clusterName);
        toggleField('modal-capacity', 'wrap-capacity', venueObj.capacity ? `${venueObj.capacity} pax` : "");
        toggleField('modal-hours', 'wrap-hours', hours);
        toggleField('modal-platform', 'wrap-platform', platform);
        toggleField('modal-cancel', 'wrap-cancel', cancel);
        toggleField('modal-remarks', 'wrap-remarks', notes);

        const facContainer = document.getElementById('modal-facilities');
        if (facContainer) {
            facContainer.innerHTML = "";
            (venueObj.facilities || []).forEach(fac => {
                const tag = document.createElement('span');
                tag.className = 'facility-badge';
                tag.textContent = fac;
                facContainer.appendChild(tag);
            });
        }

        const backdrop = document.getElementById('modal-backdrop');
        if (backdrop) backdrop.classList.add('active');
    }

    function closeVenueModal() {
        const backdrop = document.getElementById('modal-backdrop');
        if (backdrop) backdrop.classList.remove('active');
    }

    document.addEventListener("DOMContentLoaded", () => {
        renderVenues();

        const backdrop = document.getElementById('modal-backdrop');
        if (backdrop && backdrop.parentElement !== document.body) {
            document.body.appendChild(backdrop);
        }
        
        // Close modal handlers
        const closeBtn = document.getElementById('modal-close-btn');
        if (closeBtn) {
            closeBtn.addEventListener('click', closeVenueModal);
        }

        if (backdrop) {
            backdrop.addEventListener('click', (e) => {
                if (e.target.id === 'modal-backdrop') closeVenueModal();
            });
        }
    });
</script>
