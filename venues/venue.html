<!-- 2. RENDER ENGINE -->
<script>
    function renderVenues() {
        const clusters = {};
        venuesData.forEach(item => {
            if (!clusters[item.cluster]) {
                clusters[item.cluster] = [];
            }
            clusters[item.cluster].push(item);
        });

        const container = document.getElementById('venue-list-container');
        if (!container) return;
        
        container.innerHTML = "";

        let isFirst = true;
        
        for (const [clusterName, items] of Object.entries(clusters)) {
            const details = document.createElement('details');
            if (isFirst) {
                details.setAttribute('open', '');
                isFirst = false;
            }

            const summary = document.createElement('summary');
            summary.innerHTML = `<span>${clusterName}</span><span class="icon"></span>`;
            
            // Intercept click to manage smooth grid accordion collapse
            summary.addEventListener('click', (e) => {
                e.preventDefault();
                if (details.hasAttribute('open')) {
                    // If already closing, ignore extra fast clicks
                    if (details.classList.contains('closing')) return;

                    details.classList.add('closing');
                    
                    // Wait for grid animation (0.4s) to finish before removing 'open' attribute
                    setTimeout(() => {
                        details.removeAttribute('open');
                        details.classList.remove('closing');
                    }, 380);
                } else {
                    details.setAttribute('open', '');
                }
            });

            details.appendChild(summary);

            // Accordion wrapper enabling grid row expansion
            const accordionWrapper = document.createElement('div');
            accordionWrapper.className = 'accordion-wrapper';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'content';

            items.forEach(item => {
                if (item.subcategory) {
                    const secTitle = document.createElement('div');
                    secTitle.className = 'section-title';
                    secTitle.textContent = item.subcategory;
                    contentDiv.appendChild(secTitle);
                }

                const tagsDiv = document.createElement('div');
                tagsDiv.className = 'tags';

                item.venues.forEach(venue => {
                    const span = document.createElement('span');
                    span.className = 'tag';
                    span.textContent = venue;
                    tagsDiv.appendChild(span);
                });

                contentDiv.appendChild(tagsDiv);
            });

            accordionWrapper.appendChild(contentDiv);
            details.appendChild(accordionWrapper);
            container.appendChild(details);
        }
    }

    document.addEventListener("DOMContentLoaded", renderVenues);
</script>

<style>
