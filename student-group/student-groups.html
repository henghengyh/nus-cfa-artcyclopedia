    { name: "Nihon Buyo", cat: "Dance", org: "NUS Japanese Studies Society", desc: "", link: "" },
    { name: "Japanese Music Club", cat: "Music", org: "NUS Japanese Studies Society", desc: "", link: "" },
    { name: "KotoKottoN", cat: "Music", org: "NUS Japanese Studies Society", desc: "", link: "" },
    { name: "Odoro!!", cat: "Dance", org: "NUS Japanese Studies Society", desc: "", link: "" },
    { name: "NUS Sado Club", cat: "Cultural", org: "NUS Japanese Studies Society", desc: "", link: "" },

    { name: "NUS Malay Language Society (PBMUKS)", cat: "Cultural", org: "NUS Cultural Interest Groups", desc: "", link: "https://www.instagram.com/pbmuks/" },
    { name: "NUS Hindu Club", cat: "Cultural", org: "NUS Cultural Interest Groups", desc: "", link: "https://www.instagram.com/nushsoc/" },
    { name: "NUS Indian Cultural Society", cat: "Cultural", org: "NUS Cultural Interest Groups", desc: "", link: "https://www.instagram.com/nus_ics/" },
    { name: "NAACH", cat: "Dance", org: "NUS Indian Cultural Society", desc: "", link: "https://www.instagram.com/nusnaach/" },
    { name: "NUS Korean Cultural Interest Group", cat: "Cultural", org: "NUS Cultural Interest Groups", desc: "", link: "https://www.instagram.com/nus_kcig/" },
    { name: "KCIG Cultural Session (KCS)", cat: "Cultural", org: "NUS Korean Cultural Interest Group", desc: "", link: "" },
    { name: "KCIG Dance Team (KDT)", cat: "Dance", org: "NUS Korean Cultural Interest Group", desc: "", link: "" },
    { name: "KCIG Vocal Team (KVT)", cat: "Music", org: "NUS Korean Cultural Interest Group", desc: "", link: "" }
  ];

  const grid = document.getElementById('groupsGrid');
  const searchInput = document.getElementById('localSearch');
  const catFilterGroup = document.getElementById('catFilterGroup');
  const orgFilterGroup = document.getElementById('orgFilterGroup');

  // Build the "Filter by Category" checkboxes automatically from the data,
  // so new categories (Music, Dance, Theatre, etc.) show up with zero manual editing.
  function populateCatFilters(data) {
    const uniqueCats = [...new Set(data.map(g => g.cat).filter(Boolean))].sort();

    catFilterGroup.innerHTML = uniqueCats.map(cat => `
      <label><input type="checkbox" class="category-filter" value="${cat}"> ${cat}</label>
    `).join('');

    // Re-attach listeners since these checkboxes are newly created each time
    document.querySelectorAll('.category-filter').forEach(cb => {
      cb.addEventListener('change', applyFilters);
    });
  }

  // Build the "Filter by Organisation" checkboxes automatically from the data,
  // so you never have to hand-edit the sidebar when orgs change.
  function populateOrgFilters(data) {
    const uniqueOrgs = [...new Set(data.map(g => g.org).filter(Boolean))].sort();

    orgFilterGroup.innerHTML = uniqueOrgs.map(org => `
      <label><input type="checkbox" class="org-filter" value="${org}"> ${org}</label>
    `).join('');

    // Re-attach listeners since these checkboxes are newly created each time
    document.querySelectorAll('.org-filter').forEach(cb => {
      cb.addEventListener('change', applyFilters);
    });
  }

  // Function to render the cards dynamically with adaptive colors
  function renderGroups(filteredData) {
    grid.innerHTML = '';
    if (!filteredData || filteredData.length === 0) {
      grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:#777;">No groups found matching those criteria.</p>';
      return;
    }

    // Map categories to soft, clean, non-pastel colors
    const categoryColors = {
      "Music": "#cbd5e1",            // Soft slate gray
      "Dance": "#fee2e2",            // Muted brick/rose tint
      "Theatre": "#fef3c7",          // Muted warm amber
      "Film & Production": "#e0f2fe",// Muted ice blue
      "Visual Arts": "#e2e8f0",      // Light neutral gray
      "Photography": "#dcfce7",      // Muted sage green
      "Craft": "#f3e8ff",            // Muted lilac
      "Cultural": "#ffedd5",         // Muted soft orange
      "Literary": "#fae8ff",         // Muted orchid
      "General": "#f1f5f9"           // Soft fallback gray
    };

    filteredData.forEach(group => {
      const groupName = group.name || "Unnamed Group";
      const groupCat = group.cat || "General";
      const groupOrg = group.org || "";
      const groupDesc = group.desc || "";
      const groupLink = group.link || "";

      // 1. Determine button text and dynamic brand color class
      let btnText = "View on NUSync";
      let btnClass = "btn-nusync"; 
      const linkStr = groupLink.toLowerCase().trim();

      if (linkStr.includes("instagram.com")) {
        btnText = "View on Instagram";
        btnClass = "btn-instagram";
      } else if (linkStr.includes("youtube.com") || linkStr.includes("youtu.be")) {
        btnText = "Watch on YouTube";
        btnClass = "btn-youtube";
      } else if (linkStr === "") {
        btnText = "No Link Available";
        btnClass = "btn-disabled";
      } else if (!linkStr.includes("nusync.nus.edu.sg")) {
        btnText = "Visit Website"; 
        btnClass = "btn-website";
      }

      // 2. Get dynamic category tag background color
      const tagBgColor = categoryColors[groupCat] || categoryColors["General"];

      // 3. Build button element
      const hasLink = linkStr !== "";
      const buttonHtml = hasLink 
        ? `<a href="${groupLink}" class="card-btn ${btnClass}" target="_blank">${btnText}</a>`
        : `<span class="card-btn ${btnClass}">${btnText}</span>`;

      // 4. Create and append the card
      const card = document.createElement('div');
      card.className = 'group-card';
      card.innerHTML = `
        <div>
          <span class="tag-label" style="background-color: ${tagBgColor};">${groupCat}</span>
          <h4>${groupName}</h4>
          ${groupOrg ? `<span class="org-label">${groupOrg}</span>` : ''}
          <p>${groupDesc}</p>
        </div>
        ${buttonHtml}
      `;
      grid.appendChild(card);
    });
  }

  // Master function filters data based on search text + category + organisation
  function applyFilters() {
    const searchText = searchInput.value.toLowerCase();

    const checkedCats = Array.from(document.querySelectorAll('.category-filter'))
                             .filter(cb => cb.checked)
                             .map(cb => cb.value);

    const checkedOrgs = Array.from(document.querySelectorAll('.org-filter'))
                             .filter(cb => cb.checked)
                             .map(cb => cb.value);

    const filtered = groupData.filter(group => {
      const matchesSearch = group.name.toLowerCase().includes(searchText) ||
                             group.desc.toLowerCase().includes(searchText) ||
                             (group.org || '').toLowerCase().includes(searchText);

      const matchesCategory = checkedCats.length === 0 || checkedCats.includes(group.cat);
      const matchesOrg = checkedOrgs.length === 0 || checkedOrgs.includes(group.org);

      return matchesSearch && matchesCategory && matchesOrg;
    });

    renderGroups(filtered);
  }

  // Hook up event listeners so everything updates live
  searchInput.addEventListener('input', applyFilters);
  // (category & org checkbox listeners are attached inside their populate functions,
  // since those checkboxes are created dynamically)

  // Initial setup on page load
  populateCatFilters(groupData);
  populateOrgFilters(groupData);
  renderGroups(groupData);
</script>
