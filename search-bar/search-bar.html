<div class="clean-search-container">
  <div class="search-box-wrapper">
    <div class="input-container">
      <input 
        type="text" 
        id="directSearchInput" 
        placeholder="Type to search..." 
        autocomplete="off"
      >
      <div id="dynamicDropdown" class="dynamic-menu"></div>
    </div>
  </div>
</div>

<style>
  html, body, .clean-search-container { overflow: visible !important; }
  .clean-search-container { font-family: -apple-system, sans-serif; color: #333; max-width: 600px; margin: 0 auto; padding: 10px; padding-bottom: 500px; }
  .search-box-wrapper { position: relative; width: 100%; overflow: visible !important; }
  .input-container { position: relative; overflow: visible !important; }
  #directSearchInput { width: 100%; padding: 12px 16px; font-size: 1rem; border: 2px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; outline: none; }
  #directSearchInput:focus { border-color: #003d7c; }
  .dynamic-menu { display: none; position: absolute; top: 105%; left: 0; right: 0; background: #ffffff; border: 1px solid #cbd5e1; border-radius: 6px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15); z-index: 999999 !important; max-height: 350px; overflow-y: auto; }
  .menu-section-title { padding: 8px 14px; font-size: 0.75rem; text-transform: uppercase; color: #64748b; background: #f8fafc; font-weight: bold; border-bottom: 1px solid #e2e8f0; }
  
  /* Dropdown layouts containing titles and text snippets */
  .dropdown-link-item { display: block; padding: 12px 14px; color: #333; cursor: pointer; border-bottom: 1px solid #f1f5f9; }
  .dropdown-link-item:hover { background: #f1f5f9; }
  .dropdown-link-item:hover .item-title { color: #003d7c; }
  
  .item-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 3px; color: #1e293b; }
  .item-snippet { font-size: 0.8rem; color: #64748b; line-height: 1.3; }
  
  /* Custom highlight matching color rules */
  .search-highlight { color: #d97706; font-weight: bold; background-color: #fef3c7; padding: 0 2px; border-radius: 2px; }
  
  .no-results { padding: 14px; color: #64748b; text-align: center; font-size: 0.9rem; }
</style>

<script>
  const sitePersonas = [
    { label: "🪩 I'm new to NUS Arts", keywords: ["new", "nus", "freshman", "orientation"], url: "homepage" },
    { label: "🎬 I want to organise a production", keywords: ["production", "organise", "booking", "theatre"], url: "venue" },
    { label: "💰 I'm handling club finances", keywords: ["finance", "claims", "grant", "budget"], url: "funding" },
    { label: "🎭 I'm looking for performance opportunities", keywords: ["performance", "audition", "talent"], url: "student-groups" }
  ];


  const GITHUB_JSON_URL = "https://raw.githubusercontent.com/henghengyh/nus-cfa-artcyclopedia/main/search-index.json";

  let scrapedDatabase = [];
  const searchInput = document.getElementById('directSearchInput');
  const dropdown = document.getElementById('dynamicDropdown');

  async function loadSearchDatabase() {
    try {
      const res = await fetch(GITHUB_JSON_URL);
      if (res.ok) scrapedDatabase = await res.json();
    } catch (e) { console.error("Database loading deferred.", e); }
  }
  loadSearchDatabase();

  // Helper function to extract text frame surrounding the target match location
  function getSnippet(content, query) {
    if (!content) return "";
    const index = content.toLowerCase().indexOf(query);
    if (index === -1) return content.substring(0, 80) + "...";
    
    // Grab 40 characters before and 60 characters after the matched keyword
    const start = Math.max(0, index - 40);
    const end = Math.min(content.length, index + query.length + 60);
    
    let snippet = content.substring(start, end);
    if (start > 0) snippet = "..." + snippet;
    if (end < content.length) snippet = snippet + "...";
    
    return snippet;
  }

  // Helper function to dynamically insert HTML wrapper tags around matched text segments
  function highlightText(text, query) {
    if (!text) return "";
    // Escapes regex characters to avoid code breakages
    const escapedQuery = query.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
    const regex = new RegExp(`(${escapedQuery})`, 'gi');
    return text.replace(regex, `<span class="search-highlight">$1</span>`);
  }

  function updateDropdown(items, titleText, query = "") {
    dropdown.innerHTML = '';
    if (items.length === 0) {
      dropdown.innerHTML = '<div class="no-results">No matching keywords found on site.</div>';
      return;
    }

    const header = document.createElement('div');
    header.className = 'menu-section-title';
    header.textContent = titleText;
    dropdown.appendChild(header);

    items.forEach(item => {
      const itemRow = document.createElement('div');
      itemRow.className = 'dropdown-link-item';
      
      // Separate structural injection blocks for formatted Title and Snippet text layouts
      const titleDiv = document.createElement('div');
      titleDiv.className = 'item-title';
      titleDiv.innerHTML = query ? highlightText(item.label, query) : item.label;
      
      itemRow.appendChild(titleDiv);

      if (item.snippet) {
        const snippetDiv = document.createElement('div');
        snippetDiv.className = 'item-snippet';
        snippetDiv.innerHTML = highlightText(item.snippet, query);
        itemRow.appendChild(snippetDiv);
      }

      itemRow.onclick = function() {
        window.top ? window.top.location.href = item.url : window.location.href = item.url;
      };
      dropdown.appendChild(itemRow);
    });
  }

  searchInput.addEventListener('focus', () => {
    if (!searchInput.value.trim()) {
      updateDropdown(sitePersonas, "Select Your Profile / Need");
    }
    dropdown.style.display = 'block';
  });

  searchInput.addEventListener('input', (e) => {
    const query = e.target.value.toLowerCase().trim();
    if (!query) {
      updateDropdown(sitePersonas, "Select Your Profile / Need");
      return;
    }

    // A. Check hardcoded user profile mappings first
    let matches = sitePersonas.filter(item => 
      item.label.toLowerCase().includes(query) || item.keywords.some(k => k.includes(query))
    );

    // B. Deep check inside database page index models
    if (matches.length === 0 && scrapedDatabase.length > 0) {
      matches = scrapedDatabase
        .filter(page => {
          const contentText = page.content ? page.content.toLowerCase() : "";
          const titleText = page.title ? page.title.toLowerCase() : "";
          return contentText.includes(query) || titleText.includes(query);
        })
        .map(page => {
          const contentStr = page.content || "";
          // Generate context snippet string
          const rawSnippet = getSnippet(contentStr, query);
          return { 
            label: `📄 ${page.title}`, 
            url: page.url,
            snippet: rawSnippet
          };
        });
    }

    updateDropdown(matches, "Search Results", query);
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-box-wrapper')) dropdown.style.display = 'none';
  });
</script>
