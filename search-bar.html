<div class="clean-search-container">
  <div class="search-box-wrapper">    
    <div class="input-container">
      <input 
        type="text" 
        id="directSearchInput" 
        placeholder="Click to choose a persona, or type to search..." 
        autocomplete="off"
      >
      <div id="dynamicDropdown" class="dynamic-menu"></div>
    </div>
  </div>
</div>

<style>
  html, body, .clean-search-container {
    overflow: visible !important;
  }

  .clean-search-container {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #333;
    max-width: 600px;
    margin: 0 auto;
    padding: 10px;
    padding-bottom: 500px; 
  }

  .search-box-wrapper {
    position: relative;
    width: 100%;
    overflow: visible !important;
  }

  .search-label {
    display: block;
    font-weight: bold;
    font-size: 1rem;
    color: #003d7c;
    margin-bottom: 6px;
  }

  .input-container {
    position: relative;
    overflow: visible !important;
  }

  #directSearchInput {
    width: 100%;
    padding: 12px 16px;
    font-size: 1rem;
    border: 2px solid #cbd5e1;
    border-radius: 6px;
    box-sizing: border-box;
    outline: none;
    transition: border-color 0.2s;
  }

  #directSearchInput:focus {
    border-color: #003d7c;
  }

  .dynamic-menu {
    display: none;
    position: absolute;
    top: 105%;
    left: 0;
    right: 0;
    background: #ffffff;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    z-index: 999999 !important; 
    max-height: 280px;
    overflow-y: auto;
  }

  .menu-section-title {
    padding: 8px 14px;
    font-size: 0.75rem;
    text-transform: uppercase;
    color: #64748b;
    background: #f8fafc;
    font-weight: bold;
    border-bottom: 1px solid #e2e8f0;
  }

  .dropdown-link-item {
    display: block;
    padding: 12px 14px;
    color: #333;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    border-bottom: 1px solid #f1f5f9;
  }

  .dropdown-link-item:last-child {
    border-bottom: none;
  }

  .dropdown-link-item:hover {
    background: #f1f5f9;
    color: #003d7c;
    font-weight: 500;
  }

  .no-results, .loading-results {
    padding: 14px;
    color: #64748b;
    font-size: 0.9rem;
    text-align: center;
  }
</style>

<script>
  // 1. DEFAULT PERSONAS
  const siteLinks = [
    { label: "🪩 I'm new to NUS Arts", url: "" },
    { label: "🎬 I want to organise a production", url: "venue" },
    { label: "💰 I'm handling club finances", url: "funding" },
    { label: "🎭 I'm looking for performance opportunities", url: "student-groups" }
  ];

  // 2. CONFIGURATION FOR API ARCHITECTURE
  // Swap this with your actual API endpoint or backend gateway later
  const API_ENDPOINT = "https://api.yourwebsite.com/search"; 
  const TARGET_SITE = "https://yourwebsite.com"; 

  const searchInput = document.getElementById('directSearchInput');
  const dropdown = document.getElementById('dynamicDropdown');
  let debounceTimer;

  // Render elements in the UI dropdown wrapper
  function updateDropdown(items, isSearching = false) {
    dropdown.innerHTML = '';
    if (items.length === 0) {
      dropdown.innerHTML = '<div class="no-results">No matching topics found.</div>';
      return;
    }

    const header = document.createElement('div');
    header.className = 'menu-section-title';
    header.textContent = isSearching ? "Search Results" : "Select Your Profile / Need";
    dropdown.appendChild(header);

    items.forEach(item => {
      const itemRow = document.createElement('div');
      itemRow.className = 'dropdown-link-item';
      itemRow.textContent = item.label;
      
      itemRow.onclick = function() {
        if (window.top) {
          window.top.location.href = item.url;
        } else {
          window.location.href = item.url;
        }
      };
      
      dropdown.appendChild(itemRow);
    });
  }

  // Live Async Fetch call targeting the endpoint dictionary
  async function fetchSearchResults(query) {
    dropdown.innerHTML = '<div class="loading-results">Searching resources...</div>';
    
    try {
      // Constructs URL containing search query parameter and site restriction parameters
      const response = await fetch(`${API_ENDPOINT}?q=${encodeURIComponent(query)}&site=${encodeURIComponent(TARGET_SITE)}`);
      
      if (!response.ok) throw new Error("Network error during API search request");
      
      const data = await response.json();
      
      // Expected API output response mapping array format: [{ title: "Result String", url: "https://..." }]
      const mappedResults = data.map(item => ({
        label: item.title,
        url: item.url
      }));

      updateDropdown(mappedResults, true);
    } catch (error) {
      console.error("API error fallback triggered:", error);
      
      // Local fallback routine if API hits rate limiting or isn't built yet
      const fallbackMatches = siteLinks.filter(item => 
        item.label.toLowerCase().includes(query)
      );
      updateDropdown(fallbackMatches, true);
    }
  }

  // Dropdown open management on click interaction
  searchInput.addEventListener('focus', () => {
    const currentQuery = searchInput.value.trim();
    if (!currentQuery) {
      updateDropdown(siteLinks, false);
    }
    dropdown.style.display = 'block';
  });

  // Debounced execution logic handling keystrokes safely without flooding API requests
  searchInput.addEventListener('input', (e) => {
    const query = e.target.value.toLowerCase().trim();
    clearTimeout(debounceTimer);

    if (!query) {
      updateDropdown(siteLinks, false);
      return;
    }

    debounceTimer = setTimeout(() => {
      fetchSearchResults(query);
    }, 300); // 300ms wait period limits server pressure
  });

  // FIX: Fixed structural tracking to close dropdown properly when clicking outside the element
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-box-wrapper')) {
      dropdown.style.display = 'none';
    }
  });
</script>
